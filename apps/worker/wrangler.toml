name = "stock-analytics-v2-worker"
main = "src/index.ts"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_als"]
upload_source_maps = true

[triggers]
crons = ["0 * * * *"]

[vars]
FINMIND_SYMBOLS = "2330,2317,2454,2382,3231"
FINMIND_DYNAMIC_SYMBOL_LIMIT = "20"
RSS_FEED_URLS = "https://tw.stock.yahoo.com/rss?category=news,https://news.ltn.com.tw/rss/business.xml"
TWSE_NEWS_URL = "https://openapi.twse.com.tw/v1/news/newsList"
MOPS_MATERIAL_URL = "https://mops.twse.com.tw/mops/web/t05sr01_1"
PTT_STOCK_URL = "https://www.ptt.cc/bbs/Stock/index.html"
PTT_STOCK_PAGES = "3"
LLM_CLASSIFIER_ENABLED = "true"
LLM_CLASSIFIER_MODEL = "@cf/meta/llama-3.1-8b-instruct"
LLM_CLASSIFIER_LIMIT = "8"
SENTRY_ENVIRONMENT = "production"
SENTRY_TRACES_SAMPLE_RATE = "0.1"

# Secrets (set via platform secret store):
# SENTRY_DSN (wrangler secret put SENTRY_DSN)
# SENTRY_RELEASE is supplied by pnpm deploy:sentry

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "stock-analytics-v2"
database_id = "8b370f1c-9f22-47b5-b615-a5ecd26a21b2"
