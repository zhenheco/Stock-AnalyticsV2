name = "stock-analytics-v2-worker"
main = "src/index.ts"
compatibility_date = "2026-05-27"

[triggers]
crons = ["0 * * * *"]

[vars]
FINMIND_SYMBOLS = "2330,2317,2454,2382,3231"
FINMIND_DYNAMIC_SYMBOL_LIMIT = "20"
RSS_FEED_URLS = "https://tw.stock.yahoo.com/rss?category=news"
PTT_STOCK_URL = "https://www.ptt.cc/bbs/Stock/index.html"
PTT_STOCK_PAGES = "3"
LLM_CLASSIFIER_ENABLED = "true"
LLM_CLASSIFIER_MODEL = "@cf/meta/llama-3.1-8b-instruct"
LLM_CLASSIFIER_LIMIT = "8"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "stock-analytics-v2"
database_id = "8b370f1c-9f22-47b5-b615-a5ecd26a21b2"
